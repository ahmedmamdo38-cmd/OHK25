<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax</title>
    <style>
        body, html{
            height: 100%;
        }
        .p1, .p2, .p3, .p4, .parallax{
            height: 100%;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .p1{
            background-image: url(Not\ just\ a\ game.jpg);
        }
        .p2{
            background-image: url(Michael\ Jordan.jpg);
        }
        .p3{
            background-image: url(Boxing.jpg);
        }
        .p4{
            background-image: url(Running.jpg);
        }
        .text1, .text2, .text3, .text4{
            text-align: left;
            
        }

    </style>
</head>
<body>
    <div class="p1"></div>
    <div class="text1" style="height:250px;background-color:red;font-size:36px">Football</div>

    <div class="p2" ></div>
    <div class="text2" style="height: 300px; background-color: blue;font-size: 36px; color: white;">Basketball</div>

    <div class="p3"></div>
    <div class="text3" style="height: 300px; background-color:gray;font-size: 36px; color: whitesmoke;">Boxing</div>

    <div class="p4"></div>
    <div class="text4" style="height: 300px; background-color: yellow;font-size: 36px;">Running</div>

    <div class="p1"></div>
</body>
</html>
